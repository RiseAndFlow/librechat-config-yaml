version: 1.2.1
cache: true
mcpSettings:
  allowedDomains:
    - "seo-data-api-mcp-server-production-b92c.up.railway.app"
    - "gamma-mcp-gateway-production.up.railway.app"
    - "mcp.tavily.com"
    - "mcp.exa.ai"
    - "hubspot-mcp-gateway-production.up.railway.app"
mcpServers:
  se-ranking:
    type: streamable-http
    url: "https://seo-data-api-mcp-server-production-b92c.up.railway.app/mcp"
    title: "SE Ranking"
    description: "SEO data, keyword rankings, competitor analysis, and site audits"
    timeout: 30000
    initTimeout: 15000
    serverInstructions: true
  gamma:
    type: streamable-http
    url: "https://gamma-mcp-gateway-production.up.railway.app/mcp"
    title: "Gamma"
    description: "AI-generated presentations and client proposals"
    timeout: 120000
    initTimeout: 30000
    serverInstructions: true
  tavily:
    type: streamable-http
    url: "https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}"
    title: "Tavily"
    description: "Web search, news, and article extraction"
    timeout: 30000
    initTimeout: 15000
    serverInstructions: true
  exa:
    type: streamable-http
    url: "https://mcp.exa.ai/mcp?exaApiKey=${EXA_API_KEY}"
    title: "Exa"
    description: "Semantic search, company research, and deep web search"
    timeout: 30000
    initTimeout: 15000
    serverInstructions: true
  hubspot:
    type: streamable-http
    url: "https://hubspot-mcp-gateway-production.up.railway.app/mcp"
    title: "HubSpot"
    description: "CRM data, contacts, companies, deals, and pipeline management"
    timeout: 30000
    initTimeout: 15000
    serverInstructions: true
